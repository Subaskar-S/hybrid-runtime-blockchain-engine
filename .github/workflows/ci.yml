name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: '1.23'
  RUST_VERSION: 'stable'

jobs:
  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust-core/Cargo.lock') }}

      - name: Run Rust tests
        working-directory: rust-core
        run: cargo test --release

      - name: Run Rust benchmarks (compile only)
        working-directory: rust-core
        run: cargo bench --no-run

  go-tests:
    name: Go Tests
    runs-on: ubuntu-latest
    needs: rust-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: rust-core/target
          key: ${{ runner.os }}-rust-release-${{ hashFiles('rust-core/Cargo.lock') }}

      - name: Build Rust library
        working-directory: rust-core
        run: cargo build --release

      - name: Run Go tests with race detector
        env:
          CGO_ENABLED: '1'
          CGO_LDFLAGS: '-L${{ github.workspace }}/rust-core/target/release'
        run: go test ./... -v -race -timeout=120s

      - name: Run Go tests with coverage
        env:
          CGO_ENABLED: '1'
          CGO_LDFLAGS: '-L${{ github.workspace }}/rust-core/target/release'
        run: |
          go test ./... -coverprofile=coverage.out -timeout=120s
          go tool cover -func=coverage.out | tail -1

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

  build:
    name: Build Binary
    runs-on: ubuntu-latest
    needs: go-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Build Rust library
        working-directory: rust-core
        run: cargo build --release

      - name: Build Go binary
        env:
          CGO_ENABLED: '1'
          CGO_LDFLAGS: '-L${{ github.workspace }}/rust-core/target/release'
        run: go build -o bin/hybrid-runtime-blockchain-engine ./cmd/server

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary
          path: bin/hybrid-runtime-blockchain-engine

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: go-tests
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t hybrid-runtime-blockchain-engine:${{ github.sha }} -f docker/Dockerfile .

      - name: Verify Docker image
        run: docker image inspect hybrid-runtime-blockchain-engine:${{ github.sha }}
