name: Auto Approve

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  checks: read
  pull-requests: write

jobs:
  auto-approve:
    name: Auto Approve PR
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Get PR number
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const prs = run.pull_requests;
            if (prs && prs.length > 0) {
              return prs[0].number;
            }
            // Fallback: search for PR by head SHA
            const { data } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${run.head_branch}`,
              state: 'open'
            });
            if (data.length > 0) {
              return data[0].number;
            }
            throw new Error('No PR found for this workflow run');
          result-encoding: string

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Auto approve PR
        uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          pull-request-number: ${{ steps.pr.outputs.result }}
          review-message: "Auto-approved: all CI checks passed ✅"
